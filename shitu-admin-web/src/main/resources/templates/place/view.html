<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!-- 引用布局的head部分 -->
<head th:replace="~{layout :: head}"></head>
<body>
<!-- 引用布局的主体fragment -->
<div th:replace="~{layout :: layout(title='点位详情', menu='place', content=~{::content})}"></div>

<!-- 页面具体内容 -->
<div th:fragment="content">
    <div class="container-fluid">
        <!-- 页面标题 -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="fas fa-info-circle me-2"></i>点位详情</h2>
            <div>
                <a th:href="@{/place/edit/{id}(id=${place.id})}" class="btn btn-secondary me-2" th:if="${place != null}">
                    <i class="fas fa-edit me-2"></i>编辑
                </a>
                <a href="/place" class="btn btn-secondary">
                    <i class="fas fa-arrow-left me-2"></i>返回列表
                </a>
            </div>
        </div>

        <!-- 错误提示 -->
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="fas fa-exclamation-circle me-2"></i>
            <span th:text="${error}">错误信息</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <!-- 详情卡片 -->
        <div class="card" th:if="${place != null}">
            <div class="card-header bg-light border-bottom">
                <h5 class="card-title mb-0 text-dark">基本信息</h5>
            </div>
            <div class="card-body">
                <table class="table table-borderless">
                    <tbody>
                    <tr>
                        <td width="150" class="fw-medium text-secondary">点位ID</td>
                        <td width="250" th:text="${place.id}">1</td>
                        <td width="150" class="fw-medium text-secondary">点位名称</td>
                        <td th:text="${place.name}">人民广场公厕</td>
                    </tr>
                    <tr>
                        <td class="fw-medium text-secondary">所属分类</td>
                        <td>
                            <span class="badge bg-secondary" th:text="${place.categoryName}">公厕</span>
                        </td>
                        <td class="fw-medium text-secondary">状态</td>
                        <td>
                            <span th:if="${place.status == 1}" class="badge bg-success">已发布</span>
                            <span th:if="${place.status == 0}" class="badge bg-warning">待审核</span>
                            <span th:if="${place.status == 2}" class="badge bg-danger">已下架</span>
                        </td>
                    </tr>
                    <tr>
                        <td class="fw-medium text-secondary">详细地址</td>
                        <td colspan="3" class="text-dark" th:text="${place.address}">人民广场东南角</td>
                    </tr>
                    <tr>
                        <td class="fw-medium text-secondary">经纬度</td>
                        <td colspan="3">
                            <span th:if="${place.longitude != null and place.latitude != null}" class="text-dark">
                                <span th:text="${place.longitude}">116.397128</span>,
                                <span th:text="${place.latitude}">39.916527</span>
                            </span>
                            <span th:unless="${place.longitude != null and place.latitude != null}" class="text-muted">
                                未提供
                            </span>
                        </td>
                    </tr>
                    <tr>
                        <td class="fw-medium text-secondary">联系电话</td>
                        <td th:text="${place.contactPhone ?: '-'}" class="text-muted">13800138000</td>
                        <td class="fw-medium text-secondary">开放时间</td>
                        <td th:text="${place.openingHours ?: '-'}" class="text-muted">24小时</td>
                    </tr>
                    <tr>
                        <td class="fw-medium text-secondary">标签</td>
                        <td th:text="${place.tags ?: '-'}" class="text-muted">公厕,免费</td>
                        <td class="fw-medium text-secondary">访问量</td>
                        <td th:text="${place.visitCount}" class="text-dark">1234</td>
                    </tr>
                    <tr>
                        <td class="fw-medium text-secondary">收藏数</td>
                        <td th:text="${place.favoriteCount}" class="text-dark">56</td>
                        <td class="fw-medium text-secondary">评分</td>
                        <td th:text="${place.rating}" class="text-dark">4.5</td>
                    </tr>
                    <tr>
                        <td class="fw-medium text-secondary">创建人</td>
                        <td th:text="${place.createBy ?: '系统'}" class="text-muted">admin</td>
                        <td class="fw-medium text-secondary">创建时间</td>
                        <td th:text="${place.createTime != null ? #temporals.format(place.createTime, 'yyyy-MM-dd HH:mm') : '-'}" class="text-muted">2024-01-01 12:00</td>
                    </tr>
                    <tr>
                        <td class="fw-medium text-secondary">最后更新</td>
                        <td colspan="3" th:text="${place.updateTime != null ? #temporals.format(place.updateTime, 'yyyy-MM-dd HH:mm') : '-'}" class="text-muted">2024-01-01 14:00</td>
                    </tr>
                    <tr th:if="${place.description != null and !place.description.isEmpty()}">
                        <td class="fw-medium text-secondary align-top">描述</td>
                        <td colspan="3" class="text-dark" style="line-height: 1.6;" th:text="${place.description}">这里是点位描述信息</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 点位不存在提示 -->
        <div class="alert alert-warning alert-dismissible fade show" th:if="${place == null and error == null}">
            <i class="fas fa-exclamation-triangle me-2"></i>
            点位不存在或已被删除
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
    </div>

    <script th:inline="javascript">
        (function() {
            // 自定义样式补充
            const style = document.createElement('style');
            style.textContent = `
                /* 点位详情页面专属样式优化 */
                h2 {
                    color: #2d3748;
                    font-weight: 600;
                    font-size: 20px;
                    margin: 0;
                }
                .btn {
                    border-radius: 6px;
                    font-size: 14px;
                    padding: 8px 16px;
                    border: none;
                    transition: all 0.2s ease;
                }
                .btn-secondary {
                    background-color: #718096;
                    color: #ffffff;
                }
                .btn-secondary:hover {
                    background-color: #4a5568;
                    color: #ffffff;
                }
                .me-2 {
                    margin-right: 8px !important;
                }
                .card {
                    border: 1px solid #e2e8f0;
                    border-radius: 8px;
                    box-shadow: none;
                    background-color: #ffffff;
                }
                .card-header {
                    padding: 12px 20px;
                    border-bottom: 1px solid #e2e8f0;
                }
                .card-header.bg-light {
                    background-color: #f7fafc;
                }
                .card-body {
                    padding: 24px;
                }
                .card-title {
                    font-size: 16px;
                    font-weight: 600;
                    color: #2d3748;
                }
                .table {
                    width: 100%;
                    margin-bottom: 0;
                    color: #4a5568;
                    font-size: 14px;
                }
                .table-borderless > :not(caption) > * > * {
                    border-bottom: 1px solid #f0f0f0;
                    padding: 12px 8px;
                    vertical-align: middle;
                }
                .table-borderless > tbody > tr:last-child > td {
                    border-bottom: none;
                }
                .fw-medium {
                    font-weight: 500;
                }
                .text-secondary {
                    color: #718096 !important;
                }
                .text-dark {
                    color: #2d3748 !important;
                }
                .text-muted {
                    color: #a0aec0 !important;
                }
                .badge {
                    font-size: 12px;
                    padding: 4px 8px;
                    border-radius: 4px;
                }
                .badge.bg-secondary {
                    background-color: #718096 !important;
                }
                .alert {
                    border-radius: 8px;
                    border: 1px solid #fcd34d;
                    background-color: #fefcbf;
                    color: #92400e;
                    padding: 12px 16px;
                }
                .alert-danger {
                    border-color: #feb2b2;
                    background-color: #fff5f5;
                    color: #c53030;
                }
                .align-top {
                    vertical-align: top !important;
                }
            `;
            document.head.appendChild(style);
        })();
    </script>
</div>
</body>
</html>
